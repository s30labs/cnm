# This playbook contains common plays that will be run on all nodes.
- include_vars: /cfg/cnm_vars.yml
  tags: impacket

- name: Install packages
  apt:
    name: [ 'python3-pip' ]
    state: present
    force: yes
    update_cache: yes
  become: true
  tags: impacket

#- name: Upgrade pip
#  command: python3 -m pip install --upgrade pip --break-system-packages
#  tags: impacket

- name: Install impacket
  command: pip install impacket --break-system-packages
  tags: impacket

- name: Adjust timeout
  command: sed -i 's/set_connect_timeout(30)/set_connect_timeout(5)/g' /usr/local/lib/python3.13/dist-packages/impacket/dcerpc/v5/transport.py
  tags: impacket

