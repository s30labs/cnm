---
- include_vars: /cfg/cnm_vars.yml
  tags: ntp

- name: Install systemd-timesyncd
  apt:
    name: systemd-timesyncd
    state: present
    update_cache: yes
  become: true
  tags: ntp

- name: Ensure timesyncd drop-in directory exists
  file:
    path: /etc/systemd/timesyncd.conf.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: ntp

- name: Configure NTP server for systemd-timesyncd
  copy:
    dest: /etc/systemd/timesyncd.conf.d/cnm.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Time]
      NTP={{ ntpserver }}
  become: true
  notify: restart systemd-timesyncd
  tags: ntp

- name: Enable NTP synchronization
  command: timedatectl set-ntp true
  changed_when: false
  become: true
  tags: ntp

- name: Remove legacy ntpdate cron job
  file:
    path: /etc/cron.hourly/ntpdate
    state: absent
  become: true
  tags: ntp
...
